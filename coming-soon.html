<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tripick｜網站籌備中</title>
<meta name="description" content="Tripick 希臘旅遊指南籌備中，預計 2026 夏季上線。">
<meta name="robots" content="noindex, nofollow">
<style>
  :root {
    --aegean: #1d6a8c;
    --aegean-deep: #0f3f54;
    --aegean-light: #e7f0f4;
    --sand: #f4ede1;
    --terracotta: #c2693f;
    --ink: #1f2a30;
    --ink-soft: #5a6873;
    --white: #fdfcfa;
    --serif: Georgia, 'Noto Serif TC', serif;
    --sans: -apple-system, BlinkMacSystemFont, 'Noto Sans TC', 'Helvetica Neue', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 32px 24px;
    font-family: var(--sans);
    color: var(--ink);
    background:
      radial-gradient(circle at top left, rgba(29, 106, 140, 0.16), transparent 34rem),
      linear-gradient(135deg, var(--white) 0%, var(--sand) 100%);
    line-height: 1.8;
    -webkit-font-smoothing: antialiased;
  }

  .coming-soon {
    width: min(100%, 680px);
    padding: clamp(32px, 7vw, 64px);
    background: rgba(253, 252, 250, 0.84);
    border: 1px solid rgba(227, 221, 211, 0.9);
    border-radius: 28px;
    box-shadow: 0 22px 80px rgba(15, 63, 84, 0.12);
    text-align: center;
  }

  .brand {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 28px;
    color: var(--aegean-deep);
    font-family: var(--serif);
    font-size: 24px;
    font-weight: 700;
    letter-spacing: 0.02em;
  }

  .eyebrow {
    margin-bottom: 14px;
    color: var(--terracotta);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.28em;
    text-transform: uppercase;
  }

  h1 {
    margin-bottom: 18px;
    color: var(--aegean-deep);
    font-family: var(--serif);
    font-size: clamp(34px, 8vw, 56px);
    font-weight: 700;
    line-height: 1.18;
  }

  .lead {
    margin: 0 auto;
    max-width: 34rem;
    color: var(--ink-soft);
    font-size: clamp(16px, 4vw, 18px);
  }

  .launch {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-top: 32px;
    padding: 10px 18px;
    border-radius: 999px;
    background: var(--aegean-light);
    color: var(--aegean-deep);
    font-size: 14px;
    font-weight: 700;
  }

  .topics {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
    margin-top: 28px;
    list-style: none;
  }

  .topics li {
    padding: 8px 13px;
    border: 1px solid rgba(29, 106, 140, 0.16);
    border-radius: 999px;
    color: var(--ink-soft);
    background: rgba(255, 255, 255, 0.48);
    font-size: 14px;
  }
</style>
</head>
<body>
  <main class="coming-soon" aria-labelledby="coming-soon-title">
    <div class="brand">Tripick <span aria-hidden="true">🇬🇷</span></div>
    <p class="eyebrow">Coming Soon</p>
    <h1 id="coming-soon-title">希臘旅遊指南籌備中</h1>
    <p class="lead">
      我們正在整理雅典、克里特島、聖托里尼的跳島行程、住宿推薦、美食與必訪景點，
      希望把親身走過的路線與實用筆記，好好交到你手上。
    </p>
    <div class="launch">預計 2026 夏季上線</div>
    <ul class="topics" aria-label="即將推出內容">
      <li>雅典 Athens</li>
      <li>克里特島 Crete</li>
      <li>聖托里尼 Santorini</li>
      <li>跳島行程</li>
      <li>住宿推薦</li>
      <li>美食景點</li>
    </ul>
  </main>
</body>
</html>
